name: SonarQube Local Analysis
on: [push]

jobs:
  sonarqube:
    # This tells GitHub to run the job on your Mac, not in the cloud
    runs-on: self-hosted 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Scan with Maven
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://childless-subcomplete-lavon.ngrok-free.dev
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=JournalApps
